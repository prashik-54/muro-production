services:
  - type: web_service
    name: muro-backend
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        value: "https://muro-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000"
      - key: SOCKET_ORIGINS
        value: "https://muro-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000"
  - type: static_site
    name: muro-frontend
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_SERVER_URL
        value: "https://muro-backend.onrender.com"
